# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
#
# Ensure the pg gem is defined in your Gemfile:
#   gem "pg"

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= Rails.application.credentials.dig(:database, :url) %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: react_starter_kit_test


# In production, provide database URLs via Rails credentials.
production:
  primary:
    <<: *default
    url: <%= Rails.application.credentials.dig(:database, :url) %>
  cache:
    <<: *default
    url: <%= Rails.application.credentials.dig(:database, :cache_url) || Rails.application.credentials.dig(:database, :url) %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    url: <%= Rails.application.credentials.dig(:database, :queue_url) || Rails.application.credentials.dig(:database, :url) %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    url: <%= Rails.application.credentials.dig(:database, :cable_url) || Rails.application.credentials.dig(:database, :url) %>
    migrations_paths: db/cable_migrate
