# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
#
# Ensure the pg gem is defined in your Gemfile:
#   gem "pg"

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USER", ENV.fetch("USER", "postgres")) %>
  password: <%= ENV["DB_PASSWORD"] %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "react_starter_kit_development") %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME", "react_starter_kit_test") %>


# In production, configure DB_HOST/DB_PORT/DB_USER/DB_PASSWORD and optionally
# override these database names with the *_DB_NAME environment variables.
production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_PRIMARY_NAME", "react_starter_kit_production") %>
  cache:
    <<: *default
    database: <%= ENV.fetch("DB_CACHE_NAME", "react_starter_kit_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("DB_QUEUE_NAME", "react_starter_kit_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DB_CABLE_NAME", "react_starter_kit_production_cable") %>
    migrations_paths: db/cable_migrate
