<!doctype html>
<html lang="en">
  <head>
    <title>500 — Server Error</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <meta name="robots" content="noindex, nofollow" />
    <style>
      @font-face {
        font-family: "PP Editorial New";
        src: url("/fonts/PPEditorialNew-Ultralight.woff2") format("woff2");
        font-weight: 100;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "PP Editorial New";
        src: url("/fonts/PPEditorialNew-UltralightItalic.woff2") format("woff2");
        font-weight: 100;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: "InterVariable";
        src: url("/fonts/inter/InterVariable.woff2") format("woff2");
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }

      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }
      html, body { height: 100%; }

      body {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        overflow: hidden;
        background-color: #f5efd8;
        background-image: url("/505errorBG.svg");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background-color: oklch(0.9692 0.0162 95.21 / 0.45);
        pointer-events: none;
        z-index: 1;
      }

      main {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 2rem;
        gap: 0;
      }

      .code {
        color: #374d77;
        font-family: "PP Editorial New", Georgia, serif;
        font-style: italic;
        font-weight: 100;
        font-size: clamp(3rem, 6.25vw, 5rem);
        line-height: 1;
        letter-spacing: -0.01em;
      }

      .title {
        margin-top: 0.15em;
        color: #374d77;
        font-family: "PP Editorial New", Georgia, serif;
        font-weight: 100;
        font-size: clamp(3rem, 6.25vw, 5rem);
        line-height: 1;
        letter-spacing: -0.01em;
      }

      .title-regular { font-style: normal; }
      .title-italic  { font-style: italic; }

      .description {
        margin-top: clamp(1rem, 2.5vw, 1.75rem);
        max-width: 22rem;
        color: #0a3474;
        font-family: "InterVariable", "Inter", system-ui, sans-serif;
        font-weight: 400;
        font-size: clamp(1rem, 3.125vw, 2.5rem);
        line-height: 1.3;
      }

      .btn {
        display: inline-block;
        margin-top: clamp(1.5rem, 3vw, 2.5rem);
        border: 0;
        border-radius: 9999px;
        outline: 6.4px solid #f9eabf;
        outline-offset: 0;
        background-color: #f9eabf;
        color: #303a9f;
        font-family: "InterVariable", "Inter", system-ui, sans-serif;
        font-weight: 400;
        font-size: clamp(1rem, 1.875vw, 1.5rem);
        line-height: 1;
        padding: 0.55em 1.1em;
        text-decoration: none;
        white-space: nowrap;
        filter: drop-shadow(0 4px 0 #f4c33e);
        transition: transform 240ms cubic-bezier(0.175, 0.885, 0.32, 1.275),
                    filter 240ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .btn:hover  { transform: translateY(-3px); filter: drop-shadow(0 7px 0 #f4c33e); }
      .btn:active { transform: translateY(3px);  filter: drop-shadow(0 1px 0 #f4c33e); }
    </style>
  </head>
  <body>
    <div class="overlay" aria-hidden="true"></div>
    <main>
      <p class="code" id="err-code">500</p>
      <h1 class="title">
        <span class="title-regular" id="err-title-start">Server </span><span class="title-italic" id="err-title-end">Error</span>
      </h1>
      <p class="description" id="err-desc">Whoops, something went wrong on our servers.</p>
      <a class="btn" href="/" id="err-cta">Go Home →</a>
    </main>
    <script>
      fetch('/error-config.json').then(function(r){return r.json()}).then(function(cfg){
        var e = (cfg.errors||{})['500']||{};
        if(e.description) document.getElementById('err-desc').textContent = e.description;
        if(e.cta) document.getElementById('err-cta').textContent = e.cta;
        if(e.title){
          var t=e.title, i=t.lastIndexOf(' ');
          if(i===-1){
            document.getElementById('err-title-start').textContent='';
            document.getElementById('err-title-end').textContent=t;
          } else {
            document.getElementById('err-title-start').textContent=t.slice(0,i+1);
            document.getElementById('err-title-end').textContent=t.slice(i+1);
          }
        }
      }).catch(function(){});
    </script>
  </body>
</html>
